<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>간단 도구 모음 | 무료 온라인 도구</title>
<meta name="description" content="설치 없이 브라우저에서 바로 쓰는 무료 온라인 도구 모음. PDF 합치기·나누기·압축, 단위 변환 등. 파일은 서버로 올라가지 않아 안전합니다.">
<meta name="keywords" content="온라인 도구, 무료 도구, PDF 도구, PDF 합치기, PDF 나누기, PDF 압축, 평 제곱미터 변환">
<link rel="canonical" href="https://mureds.github.io/tools/">
<meta property="og:title" content="간단 도구 모음 | 무료 온라인 도구">
<meta property="og:description" content="설치 없이 브라우저에서 바로 쓰는 무료 온라인 도구 모음.">
<meta property="og:type" content="website">
<!-- ADSENSE_HEAD: 애드센스 승인 후 여기에 로더 스크립트 삽입 -->
<style>
  :root { --ink:#1a1a1a; --muted:#6b6b6b; --line:#e6e6e6; --accent:#2f6f4f; --bg:#fbfaf7; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
         color:var(--ink); background:var(--bg); line-height:1.6; }
  main { max-width:600px; margin:0 auto; padding:44px 20px 64px; }
  h1 { font-size:28px; font-weight:700; margin:0 0 6px; letter-spacing:-0.02em; }
  .sub { color:var(--muted); margin:0 0 12px; font-size:15px; }
  .group { margin-top:32px; }
  .group h2 { font-size:14px; font-weight:700; color:var(--muted);
              margin:0 0 12px; letter-spacing:0; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media (max-width:460px){ .grid { grid-template-columns:1fr; } }
  a.card { display:block; background:#fff; border:1px solid var(--line); border-radius:12px;
           padding:16px; text-decoration:none; color:var(--ink); transition:border-color .15s, transform .1s; }
  a.card:hover { border-color:var(--accent); transform:translateY(-1px); }
  a.card .t { font-weight:700; font-size:16px; }
  a.card .d { color:var(--muted); font-size:13px; margin-top:4px; }
  footer { margin-top:44px; font-size:12px; color:var(--muted); text-align:center; }
</style>
</head>
<body>
<main>
  <h1>간단 도구 모음</h1>
  <p class="sub">설치 없이 브라우저에서 바로 쓰는 무료 도구. 파일은 서버로 올라가지 않아 안전합니다.</p>

  <div class="group">
    <h2>PDF 도구</h2>
    <div class="grid">
      <a class="card" href="./pdf-merge/">
        <div class="t">PDF 합치기</div>
        <div class="d">여러 PDF를 순서대로 하나로. 무손실.</div>
      </a>
      <a class="card" href="./pdf-split/">
        <div class="t">PDF 나누기</div>
        <div class="d">원하는 페이지만 뽑거나 낱장으로 분할.</div>
      </a>
      <a class="card" href="./pdf-compress/">
        <div class="t">PDF 용량 줄이기</div>
        <div class="d">스캔·사진 PDF 압축 (스캔 문서 전용).</div>
      </a>
    </div>
  </div>

  <div class="group">
    <h2>변환·계산</h2>
    <div class="grid">
      <a class="card" href="./pyeong-to-m2/">
        <div class="t">평 ↔ ㎡ 변환기</div>
        <div class="d">평수와 제곱미터를 즉시 양방향 변환.</div>
      </a>
    </div>
  </div>

  <footer>© 2026 mureds · 브라우저에서 바로 쓰는 무료 도구</footer>
</main>
</body>
</html>
